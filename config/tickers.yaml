# ============================================================================
# Equity EOD Data Pipeline - Ticker Configuration
# ============================================================================
# This file defines all tickers to be fetched by market, along with metadata
# for filtering, grouping, and validation.
#
# Schema:
#   - symbol: Stock ticker symbol (market-specific format)
#   - name: Company name
#   - exchange: Exchange code (NYSE, NASDAQ, HKEX, etc.)
#   - sector: Business sector (Technology, Finance, etc.)
#   - tags: List of tags for grouping (blue-chip, FAANG, etc.)
#   - active: Set to false to skip fetching this ticker
#   - priority: Higher priority = fetch first (1-10, default: 5)
# ============================================================================

