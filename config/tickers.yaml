# ============================================================================
# Configuration validation rules
# ============================================================================
validation:
  # Ensure ticker symbols match market-specific formats
  market_formats:
    us: "^[A-Z]{1,5}(-[A-Z]{1,2})?$"  # e.g., AAPL, BRK-A
    cn: "^\\d{6}$"  # 6-digit code
    hk: "^\\d{4}\\.HK$"  # e.g., 0700.HK
    sg: "^[A-Z]\\d{2}\\.SI$"  # e.g., D05.SI

  # Required fields for each ticker entry
  required_fields: [symbol, name, exchange, sector, active]

  # Valid exchanges by market
  valid_exchanges:
    us: [NYSE, NASDAQ, AMEX]
    cn: [SSE, SZSE]
    hk: [HKEX]
    sg: [SGX]

  # Valid sectors
  valid_sectors:
    - Technology
    - Financial Services
    - Healthcare
    - Consumer Cyclical
    - Consumer Defensive
    - Energy
    - Industrials
    - Communication Services
    - Real Estate
    - Utilities
    - Basic Materials

  # Valid tags (optional, for consistency)
  valid_tags:
    - blue-chip
    - S&P 500
    - HSI
    - FAANG
    - growth
    - dividend
    - SOE
    - banking
    - insurance
    - semiconductor
    - EV
    - internet
    - ecommerce
    - major
