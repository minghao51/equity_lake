# Backtest strategy signals
backtest:
  enabled: true
  strategies:
    - name: "momentum"
      lookback_days: 20
      buy_threshold: 0.02
      sell_threshold: -0.01
  min_win_rate: 0.55

# News sentiment signals
sentiment:
  enabled: true
  sources:
    - "yahoo"
  buy_threshold: 0.5
  sell_threshold: -0.3
  min_articles: 3
  lookback_days: 7

# ML prediction signals
ml:
  enabled: true
  model_dir: "data/models"
  mode: "v1_direction"
  horizon_days: 5
  buy_probability_threshold: 0.60
  sell_probability_threshold: 0.40
  min_confidence: 60
  vertical_barrier_days: 5
  pt_mult: 1.5
  sl_mult: 1.0
  embargo_days: 1
  meta_label_threshold: 0.55

aggregation:
  agreement_boost: 10
  unanimous_boost: 20
