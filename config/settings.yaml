project:
  name: equity-lake
  version: 0.1.0
  environment: development

ingestion:
  default_markets:
    - us
    - cn
    - hk_sg
    - macro
    - us_news
    - us_social_sentiment
    - rss_news
    - reddit_posts
    - us_analyst_ratings
  ticker_config_path: config/tickers.yaml

schedule:
  enabled: true
  cron: "0 1 * * 1-5"
  timezone: Asia/Singapore

dashboard:
  enabled: true
  output_dir: site
  data_file: dashboard-data.json
  title: Equity Lake
  subtitle: Local-first market data, published as a static status page.

monitoring:
  max_age_days: 2
  null_threshold_pct: 5.0
