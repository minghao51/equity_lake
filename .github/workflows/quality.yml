name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Pytest
        run: uv run pytest -q -m "not integration"

      - name: Security audit (advisory policy)
        continue-on-error: true
        run: uv run pip-audit --skip-editable

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install documentation dependencies
        run: uv sync --group dev --group docs

      - name: Markdown lint
        run: uv run pymarkdown --disable-rules MD013,MD033,MD041 scan docs/developer/architecture/data-flow.md docs/developer/architecture/pipeline-contracts.md docs/user-guide/ingestion.md

      - name: MkDocs build
        run: uv run mkdocs build

      - name: Internal link validation
        run: uv run mkdocs build --site-dir /tmp/equity-lake-site

  cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Verify CLI command tree
        run: |
          uv run equity --help
          uv run equity dashboard build --help
          uv run equity dashboard serve --help
          uv run equity monitor --help
          uv run equity pipeline --help
          uv run equity catalog-generate --help
