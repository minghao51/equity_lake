name: Data Validation

on:
  pull_request:
    paths:
      - "config/tickers.yaml"
      - "config/watchlist.yaml"
      - "config/signals.yaml"
  push:
    branches:
      - main
    paths:
      - "config/tickers.yaml"
      - "config/watchlist.yaml"
      - "config/signals.yaml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync

      - name: Validate all config files
        run: uv run equity config validate --all
