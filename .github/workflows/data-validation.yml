name: Data Validation

on:
  pull_request:
    paths:
      - "config/tickers.yaml"
      - "config/watchlist.yaml"
      - "config/signals.yaml"
  push:
    branches:
      - main
    paths:
      - "config/tickers.yaml"
      - "config/watchlist.yaml"
      - "config/signals.yaml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Validate tickers.yaml
        run: uv run python scripts/validate_configs.py --tickers config/tickers.yaml

      - name: Validate watchlist.yaml
        if: hashFiles('config/watchlist.yaml') != ''
        run: uv run python scripts/validate_configs.py --watchlist config/watchlist.yaml

      - name: Validate signals.yaml
        if: hashFiles('config/signals.yaml') != ''
        run: uv run python scripts/validate_configs.py --signals config/signals.yaml
