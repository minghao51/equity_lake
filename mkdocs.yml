site_name: Equity Lake
site_description: Local-first equity EOD data pipeline
site_url: https://minghao.github.io/equity_lake
repo_name: equity_lake
repo_url: https://github.com/minghao/equity_lake

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
  - User Guide:
      - CLI Reference: user-guide/cli-reference.md
      - Pipeline: user-guide/pipeline.md
      - Backtesting: user-guide/backtesting.md
      - Signals: user-guide/signals.md
      - Dashboard Hosting: user-guide/dashboard-hosting.md
  - Developer:
      - Architecture: developer/architecture/ARCHITECTURE.md
      - Stack: developer/architecture/STACK.md
      - Testing: developer/architecture/TESTING.md
      - Conventions: developer/architecture/CONVENTIONS.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

extra:
  version:
    provider: mike
