site_name: Equity Lake
site_description: Local-first equity EOD data pipeline
site_url: https://minghao.github.io/equity_lake
repo_name: equity_lake
repo_url: https://github.com/minghao/equity_lake
exclude_docs: README.md

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
  - Notebooks:
      - Setup & Config: notebooks/01-setup-and-config.ipynb
      - Data Ingestion: notebooks/02-data-ingestion.ipynb
      - Storage & Queries: notebooks/03-storage-and-queries.ipynb
      - Hamilton Features: notebooks/04-hamilton-features.ipynb
      - Feature Deep Dive: notebooks/05-feature-engineering-deep-dive.ipynb
      - ML Prediction: notebooks/06-ml-prediction.ipynb
      - Signal Scanning: notebooks/07-signal-scanning.ipynb
      - Backtesting: notebooks/08-backtesting.ipynb
      - Sentiment Analysis: notebooks/09-sentiment-analysis.ipynb
      - Validation & Quality: notebooks/10-validation-and-quality.ipynb
  - User Guide:
      - CLI Reference: user-guide/20260406-cli-reference.md
      - Pipeline: user-guide/pipeline.md
      - Backtesting: user-guide/backtesting.md
      - Signals: user-guide/signals.md
      - Dashboard Hosting: user-guide/20260406-dashboard-hosting.md
  - Developer:
      - Architecture: developer/architecture/ARCHITECTURE.md
      - Stack: developer/architecture/STACK.md
      - Testing: developer/architecture/TESTING.md
      - Conventions: developer/architecture/CONVENTIONS.md

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      theme: light
      include: ["*.ipynb"]
      show_input: true
      no_prompt: false
      allow_errors: false
      include_source: true
      include_requirejs: true
      cache: true
      cache_dir: .cache/mkdocs-jupyter
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

extra_css:
  - stylesheets/jupyter-fix.css

extra_javascript:
  - javascripts/jupyter-theme-bridge.js

extra:
  version:
    provider: mike
